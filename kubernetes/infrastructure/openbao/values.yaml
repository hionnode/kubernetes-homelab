global:
  openshift: false

server:
  standalone:
    enabled: true
    config: |
      ui = true
      listener "tcp" {
        tls_disable = 1
        address = "[::]:8200"
        cluster_address = "[::]:8201"
      }
      storage "raft" {
        path = "/openbao/data"
      }

  ha:
    enabled: false

  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 500m

  dataStorage:
    enabled: true
    size: 1Gi
    # storageClass: longhorn  # uncomment once Longhorn is deployed

  service:
    type: LoadBalancer
    annotations:
      metallb.universe.tf/loadBalancerIPs: "10.0.0.51"

ui:
  enabled: true

injector:
  enabled: false

csi:
  enabled: false
