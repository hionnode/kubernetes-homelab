apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openbao
  namespace: argocd
spec:
  project: default
  sources:
  - repoURL: https://openbao.github.io/openbao-helm
    chart: openbao
    targetRevision: 0.8.0
    helm:
      valueFiles:
      - $values/kubernetes/infrastructure/openbao/values.yaml
  - repoURL: git@github.com:hionnode/kubernetes-homelab.git
    targetRevision: main
    ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: openbao
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    # No automated sync — pod restarts require manual unseal
